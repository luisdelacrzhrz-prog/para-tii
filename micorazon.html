<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TE REGALO MI ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8b6d1, #f4a8c9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        canvas {
            position: absolute;
            max-width: 90%;
            max-height: 50vh;
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .texto-dedicatoria {
            text-align: center;
            color: #8628a3;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease, transform 1.5s ease;
            padding: 0 1rem;
            z-index: 4;
            position: absolute;
            top: 5%; /* JUSTO EN LOS PIES DEL OSO */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
        }

        .texto-dedicatoria.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            color: rgb(204, 0, 255);
        }

        .texto-eterno {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #8628a3;
    opacity: 0;
    transition: all 2s ease;
    }

        .osito {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transform: translateX(-50%) scale(0.4);
            transition: all 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2;
            width: 380px;
            height: 380px;
            filter: drop-shadow(0 12px 35px rgba(0,0,0,0.5));
        }

        .osito.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .osito img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="lienzoCorazon"></canvas>

    <div class="osito" id="osito">
        <img src="18253.png" alt="Osito abrazando corazón">
    </div>

    <div class="texto-dedicatoria" id="texto">
        <h2>Te entrego mi corazón no como gesto si no como promesa que siempre serás mi lugar favorito</h2>
        <p>28/04 y 05/01 mis días favoritos</p>
    </div>
    
    <div class="texto-eterno" id="eterno">
        <h3> Tú y yo por siempre</h3>
        <p>✨ N y L ✨</p>
    </div>

    <script>
        const canvas = document.getElementById('lienzoCorazon');
        const ctx = canvas.getContext('2d');
        const texto = document.getElementById('texto');
        const osito = document.getElementById('osito');

        // 🎯 SECUENCIA PERFECTA: CORAZÓN → OSITO → TEXTO
        const TIEMPOS = {
            dibujoCorazon: 2000,    // 4s - dibujar contorno
            llenadoCorazon: 1500,   // 2.5s - llenar corazón
            esperaOsito: 0,       // 0.6s - osito aparece
            esperaTexto: 3000       // 2s - texto al final
        };

        function ajustarTamano() {
            const tamano = Math.min(window.innerWidth * 0.8, 500);
            canvas.width = tamano;
            canvas.height = tamano;
        }
        ajustarTamano();
        window.addEventListener('resize', () => {
            ajustarTamano();
            dibujarCorazonPasoAPaso();
        });

        function puntoEnCorazon(t, centroX, centroY, escala) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: centroX + x * escala, y: centroY - y * escala };
        }

        function dibujarCorazonPasoAPaso() {
            const centroX = canvas.width / 2;
            const centroY = canvas.height / 2;
            const escala = canvas.width / 40;
            let etapa = 'dibujando';
            const tiempoInicio = performance.now();

            function actualizar(tiempoActual) {
                const transcurrido = tiempoActual - tiempoInicio;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#991b1b';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';

                if (etapa === 'dibujando') {
                    const progreso = Math.min(transcurrido / TIEMPOS.dibujoCorazon, 1);
                    const puntosAMostrar = Math.PI * 2 * progreso;

                    ctx.beginPath();
                    let ultimoPunto;
                    for (let t = 0; t <= puntosAMostrar; t += 0.01) {
                        const punto = puntoEnCorazon(t, centroX, centroY, escala);
                        t === 0 ? ctx.moveTo(punto.x, punto.y) : ctx.lineTo(punto.x, punto.y);
                        ultimoPunto = punto;
                    }
                    ctx.stroke();

                    if (ultimoPunto && progreso < 1) {
                        ctx.fillStyle = '#ef4444';
                        ctx.beginPath();
                        ctx.arc(ultimoPunto.x, ultimoPunto.y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (progreso >= 1) {
                        etapa = 'llenando';
                    } else {
                        requestAnimationFrame(actualizar);
                        return;
                    }
                }

                if (etapa === 'llenando') {
                    ctx.beginPath();
                    for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                        const punto = puntoEnCorazon(t, centroX, centroY, escala);
                        t === 0 ? ctx.moveTo(punto.x, punto.y) : ctx.lineTo(punto.x, punto.y);
                    }
                    ctx.stroke();

                    const progreso = Math.min((transcurrido - TIEMPOS.dibujoCorazon) / TIEMPOS.llenadoCorazon, 1);
                    ctx.save();
                    ctx.beginPath();
                    for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                        const punto = puntoEnCorazon(t, centroX, centroY, escala);
                        t === 0 ? ctx.moveTo(punto.x, punto.y) : ctx.lineTo(punto.x, punto.y);
                    }
                    ctx.clip();

                    const yInicio = canvas.height * (1 - progreso);
                    const gradiente = ctx.createLinearGradient(0, yInicio, 0, canvas.height);
                    gradiente.addColorStop(0, '#fca5a5');
                    gradiente.addColorStop(1, '#dc2626');
                    ctx.fillStyle = gradiente;
                    ctx.fillRect(0, yInicio, canvas.width, canvas.height - yInicio);
                    ctx.restore();

                    if (progreso >= 1) {
                        ctx.save();
                        ctx.beginPath();
                        for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                            const punto = puntoEnCorazon(t, centroX, centroY, escala);
                            t === 0 ? ctx.moveTo(punto.x, punto.y) : ctx.lineTo(punto.x, punto.y);
                        }
                        ctx.clip();
                        ctx.fillStyle = '#dc2626';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.restore();

                        // ✅ SECUENCIA: CORAZÓN → OSITO → TEXTO EN LOS PIES
                        setTimeout(() => osito.classList.add('visible'), TIEMPOS.esperaOsito);
                        setTimeout(() => texto.classList.add('visible'), TIEMPOS.esperaOsito + TIEMPOS.esperaTexto);
                    } else {
                        requestAnimationFrame(actualizar);
                    }
                }
            }
            requestAnimationFrame(actualizar);
        }

        window.addEventListener('load', () => {
            texto.classList.remove('visible');
            osito.classList.remove('visible');
            dibujarCorazonPasoAPaso();
        });
    </script>
</body>
</html>
